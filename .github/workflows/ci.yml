name: ci

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install Solidity dependencies
        run: |
          forge install foundry-rs/forge-std --no-commit
          forge install OpenZeppelin/openzeppelin-contracts@v4.9.6 --no-commit
          forge install OpenZeppelin/openzeppelin-contracts-upgradeable@v4.9.6 --no-commit
      - name: Install Node dependencies
        run: npm install
      - name: Format check
        run: forge fmt --check
      - name: Solhint
        run: npm run lint:sol
      - name: Build contracts
        run: forge build
      - name: Test contracts
        run: forge test -vvv
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
      - name: Coverage
        run: forge coverage --report summary --report lcov
      - name: Slither
        run: |
          python3 -m pip install slither-analyzer
          slither . --filter-paths "test|script|lib" --exclude-dependencies --fail-medium

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Prettier check
        working-directory: frontend
        run: npm run format:check
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  subgraph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install subgraph dependencies
        working-directory: subgraph
        run: npm install
      - name: Build subgraph
        working-directory: subgraph
        run: npm run codegen && npm run build
