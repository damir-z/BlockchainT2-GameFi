repos:
  - repo: local
    hooks:
      - id: forge-fmt
        name: forge fmt --check
        entry: forge fmt --check
        language: system
        files: '\.sol$'
      - id: solhint
        name: solhint
        entry: npm run lint:sol
        language: system
        files: '\.sol$'
      - id: prettier
        name: prettier check
        entry: npm run format:check
        language: system
        files: '\.(md|json|yml|yaml|ts|tsx|css)$'
